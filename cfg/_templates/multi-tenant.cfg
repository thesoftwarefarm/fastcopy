# Multi-tenant config — for use with fastcopy-multi.sh (NOT fastcopy.sh).
#
# Multi-tenant mode discovers tenant DB names by running TENANT_DISCOVERY_QUERY
# against LANDLORD_DB_NAME, then clones the landlord plus every tenant
# sequentially, continuing past individual failures. A summary table is printed
# at the end. Exit code is 1 if any clone failed, 0 otherwise.
#
# Usage:
#   ./fastcopy-multi.sh /path/to/this.cfg

# ---- SSH (to reach the remote DB through a tunnel) ----
REMOTE_HOST=1.2.3.4
REMOTE_SSH_USER=ubuntu
SSH_PORT=22
SSH_IDENTITY_FILE=~/.ssh/id_rsa # optional; omit if using default agent keys
SSH_STRICT_HOST_KEY_CHECKING=no # yes|no

# ---- Remote MySQL (credentials are for MySQL, not SSH) ----
REMOTE_DB_HOST=127.0.0.1 # usually 127.0.0.1 from the server
REMOTE_DB_PORT=3306
REMOTE_DB_USER=dbuser # needs SELECT on landlord + each tenant; LOCK TABLES on each
REMOTE_DB_PASSWORD=mypassword

# ---- Multi-tenant discovery ----
LANDLORD_DB_NAME=app_landlord
# Single-column SELECT returning the tenant DATABASE name (not subdomain, not
# display name — the actual schema on the remote server). First column of each
# row wins. The column-name header row is auto-skipped. Names must match
# ^[A-Za-z0-9_$]+$; anything else is logged and skipped (injection defense).
TENANT_DISCOVERY_QUERY="SELECT \`database\` FROM tenants WHERE active=1"

# Optional prefix prepended to every target DB name (landlord + tenants).
# Default is empty, which preserves source names on the target side.
TARGET_DB_PREFIX=clone_

# Append _YYYYmmdd_HHMMSS to every target DB name. Stacks with TARGET_DB_PREFIX.
CLONE_WITH_TIMESTAMP=false

# ---- Target Docker MySQL ----
TARGET_DOCKER_CONTAINER=mysql8-mysql-dev8-1
TARGET_DB_USER=root
TARGET_DB_PASSWORD=my-secret-pw
# NOTE: TARGET_DB_NAME from sample.cfg is NOT used here — each clone derives its
# own target name from the source plus TARGET_DB_PREFIX / CLONE_WITH_TIMESTAMP.

# ---- Common knobs (apply to landlord AND every tenant unless overridden) ----
DUMP_THREADS=8 # optional; defaults to nproc
LOAD_THREADS=8
DUMP_COMPRESSION=zstd # zstd|gzip|none
KEEP_DUMP=false
DROP_TARGET_DATABASE_BEFORE_LOAD=true
# TARGET_DB_CHARSET=
# TARGET_DB_COLLATION=
# LOCAL_DUMP_BASE=/tmp

# Defaults for the overridable knobs:
EXCLUDE_TABLES_DATA=""
DEFER_INDEXES=all   # none|fulltext|secondary|all
IGNORE_EXISTING=true

# ---- Landlord overrides (optional; fall back to common defaults if unset) ----
# LANDLORD_EXCLUDE_TABLES_DATA="audit_log,event_stream"
# LANDLORD_DEFER_INDEXES=all
# LANDLORD_IGNORE_EXISTING=true

# ---- Tenant overrides (optional; applied to every tenant) ----
# TENANT_EXCLUDE_TABLES_DATA="sessions,jobs"
# TENANT_DEFER_INDEXES=all
# TENANT_IGNORE_EXISTING=true
